name: SmartCRM CI/CD

on:
  push:
    branches: [main, claude/intelligent-lovelace-q0p5uj]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/smartcrm_test
  NEXTAUTH_SECRET: test-secret-key-for-ci-at-least-32-chars-long
  NEXTAUTH_URL: http://localhost:3000
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Type Check + Lint + Build
  # ─────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ env.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ env.NEXTAUTH_URL }}

  # ─────────────────────────────────────────────
  # JOB 2: Database + Migration + Seed Test
  # ─────────────────────────────────────────────
  database:
    name: Database Migration & Seed
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smartcrm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx ts-node --compiler-options '{"module":"CommonJS"}' prisma/seed.ts

      - name: Verify seed data
        run: |
          npx ts-node --compiler-options '{"module":"CommonJS"}' - <<'EOF'
          import { PrismaClient } from "@prisma/client";
          const prisma = new PrismaClient();
          async function verify() {
            const users = await prisma.user.count();
            const leads = await prisma.lead.count();
            const contacts = await prisma.contact.count();
            const companies = await prisma.company.count();
            const deals = await prisma.deal.count();
            const tasks = await prisma.task.count();
            console.log("✅ Seed verification:");
            console.log(`   Users:     ${users}`);
            console.log(`   Leads:     ${leads}`);
            console.log(`   Contacts:  ${contacts}`);
            console.log(`   Companies: ${companies}`);
            console.log(`   Deals:     ${deals}`);
            console.log(`   Tasks:     ${tasks}`);
            if (users < 3) throw new Error("Expected at least 3 users");
            if (leads < 4) throw new Error("Expected at least 4 leads");
            if (deals < 4) throw new Error("Expected at least 4 deals");
            console.log("✅ All checks passed!");
            await prisma.$disconnect();
          }
          verify().catch((e) => { console.error(e); process.exit(1); });
          EOF

  # ─────────────────────────────────────────────
  # JOB 3: API Integration Tests
  # ─────────────────────────────────────────────
  api-test:
    name: API Integration Tests
    runs-on: ubuntu-latest
    needs: database

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: smartcrm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations and seed
        run: |
          npx prisma migrate deploy
          npx ts-node --compiler-options '{"module":"CommonJS"}' prisma/seed.ts

      - name: Build Next.js app
        run: npm run build

      - name: Start Next.js server
        run: npm start &
        env:
          PORT: 3000

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server..."
          for i in {1..30}; do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "✅ Server is up!" && break
            echo "  attempt $i/30..."
            sleep 2
          done

      - name: Test auth - Register new user
        run: |
          RESP=$(curl -sf -X POST http://localhost:3000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"name":"Test User","email":"testci@smartcrm.com","password":"Test@1234"}')
          echo "Register response: $RESP"
          echo "$RESP" | grep -q '"id"' && echo "✅ Register works" || (echo "❌ Register failed" && exit 1)

      - name: Test auth - Duplicate email rejected
        run: |
          RESP=$(curl -s -X POST http://localhost:3000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"name":"Test User","email":"admin@smartcrm.com","password":"Test@1234"}')
          echo "Duplicate check: $RESP"
          echo "$RESP" | grep -q '"error"' && echo "✅ Duplicate rejected correctly" || (echo "❌ Should have rejected duplicate" && exit 1)

      - name: Test NextAuth endpoint is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/auth/providers)
          echo "Auth providers status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ NextAuth endpoint OK" || (echo "❌ NextAuth endpoint failed: $STATUS" && exit 1)

      - name: Test login page renders
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/auth/login)
          echo "Login page status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Login page OK" || (echo "❌ Login page failed: $STATUS" && exit 1)

      - name: Test redirect to login when unauthenticated
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L http://localhost:3000/dashboard)
          echo "Dashboard redirect status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Auth redirect OK" || (echo "❌ Dashboard redirect failed: $STATUS" && exit 1)

      - name: Test 404 page
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/nonexistent-page)
          echo "404 status: $STATUS"
          [ "$STATUS" = "404" ] && echo "✅ 404 page OK" || echo "ℹ️  404 status: $STATUS (acceptable)"

  # ─────────────────────────────────────────────
  # JOB 4: Security Checks
  # ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check for high/critical vulnerabilities
        run: npm audit --audit-level=high || true

      - name: Check .env is not committed
        run: |
          if git ls-files | grep -q "^\.env$"; then
            echo "❌ .env file is committed! Remove it immediately."
            exit 1
          else
            echo "✅ .env file is not committed"
          fi

      - name: Verify .gitignore has .env
        run: |
          grep -q "^\.env$" .gitignore && echo "✅ .env is in .gitignore" || (echo "❌ .env missing from .gitignore" && exit 1)

      - name: Check for hardcoded secrets
        run: |
          if grep -r "NEXTAUTH_SECRET\s*=\s*['\"][^'\"]\{1,\}['\"]" src/ --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "❌ Hardcoded secret found in source!"
            exit 1
          else
            echo "✅ No hardcoded secrets in source files"
          fi

  # ─────────────────────────────────────────────
  # JOB 5: Deploy to Vercel (only on main push)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build, database, api-test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel Production
        run: |
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --env DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --env NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }} \
            --env NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }} \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
